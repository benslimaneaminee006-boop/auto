name: Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Make gradlew executable
        run: chmod +x vtc-auto-accept/gradlew

      - name: Build APK
        run: ./gradlew assembleDebug
        working-directory: vtc-auto-accept

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: vtc-auto-accept/app/build/outputs/apk/debug/app-debug.apk
